<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUÉ - La Voix de l'Ombre</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            /* Couleurs par défaut (Mode Nuit) */
            --bg: #000000;
            --card-bg: #0a0a0a;
            --text: #E0E0E0;
            --accent: #888888;
            --border: #222222;
            --highlight: #ffffff;
        }

        /* Variables pour le Mode Jour */
        body.light-mode {
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --accent: #666666;
            --border: #dddddd;
            --highlight: #000000;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Courier New', Courier, monospace; 
            transition: background 0.3s, color 0.3s;
            margin: 0; padding: 0; line-height: 1.6;
        }

        /* Bouton Thème */
        .theme-switch { position: absolute; top: 20px; left: 20px; z-index: 1100; }
        .theme-btn { background: transparent; border: 1px solid var(--border); color: var(--text); font-size: 1.2em; cursor: pointer; padding: 5px; border-radius: 50%; }

        /* Changement de langue */
        .lang-switch { position: absolute; top: 20px; right: 20px; z-index: 1100; display: flex; gap: 5px; }
        .lang-btn { background: transparent; color: var(--accent); border: 1px solid var(--border); padding: 5px 8px; cursor: pointer; font-size: 0.7em; }
        .lang-btn.active { color: var(--highlight); border-color: var(--highlight); }
        
        /* Écran Manifeste */
        #manifesto-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; box-sizing: border-box; }
        
        /* Structure de l'application */
        header { padding: 20px; border-bottom: 1px solid var(--border); text-align: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        h1 { letter-spacing: 10px; margin: 0; font-size: 2.5em; }
        
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); background: var(--bg); }
        .tab { padding: 15px 5px; text-align: center; font-size: 0.65em; cursor: pointer; color: var(--accent); text-transform: uppercase; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--highlight); border-bottom: 2px solid var(--highlight); }
        
        #feed { padding: 20px; padding-bottom: 240px; }
        .post-card { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        
        /* Zone d'écriture fixe en bas */
        .input-area { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); border-top: 1px solid var(--border); padding: 20px; box-sizing: border-box; z-index: 200; }
        .input-container { display: flex; background: var(--bg); padding: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        textarea { background: transparent; border: none; color: var(--text); font-family: inherit; width: 100%; outline: none; resize: none; font-size: 14px; }
        
        .main-btn { background: var(--highlight); color: var(--bg); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        footer { margin-top: 10px; text-align: center; font-size: 0.6em; color: var(--accent); }
    </style>
</head>
<body>

    <!-- Contrôles du haut -->
    <div class="theme-switch">
        <button id="theme-icon" class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
    </div>

    <!-- Écran de bienvenue obligatoire -->
    <div id="manifesto-screen">
        <h2 id="m-title">MANIFESTE DE QUÉ</h2>
        <p id="m-text">...</p>
        <button id="m-btn" class="main-btn" style="width: 200px;" onclick="document.getElementById('manifesto-screen').style.display='none'">J'ENTRE</button>
    </div>

    <!-- Application Principale -->
    <header>
        <h1>QUÉ</h1>
        <p id="tagline" style="font-size: 0.7em; color: var(--accent); margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;"></p>
    </header>

    <div class="tabs">
        <div id="tab1" class="tab active" onclick="switchTab(0)">Politique</div>
        <div id="tab2" class="tab" onclick="switchTab(1)">Économie</div>
        <div id="tab3" class="tab" onclick="switchTab(2)">Culture</div>
        <div id="tab4" class="tab" onclick="switchTab(3)">Société</div>
    </div>

    <div id="feed"></div>

    <!-- Zone de publication -->
    <div class="input-area">
        <div class="input-container">
            <span id="prefix-ui" style="color:var(--accent); font-weight:bold; padding-right:5px;"></span>
            <textarea id="message-input" rows="2" placeholder="..."></textarea>
        </div>
        <button id="pub-btn" class="main-btn" onclick="publier()">PUBLIER</button>
        <footer>
            <span id="legal-txt" onclick="alertLegal()" style="cursor:pointer;">Légal / Legal / Aviso Legal</span>
        </footer>
    </div>

    <!-- Chargement propre de la bibliothèque Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // CONFIGURATION SUPABASE OK
        const SUPABASE_URL = "https://rmykkkotkleexmggkbld.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJteWtra290a2xlZXhtZ2drYmxkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjYyNDksImV4cCI6MjA5NDcwMjI0OX0.G8uQ_1BI2lMYDIM-fpI6SW9arG-V8q9BfSh__kZSDM0";
        
        // Initialisation de la connexion
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const translations = {
            fr: {
                tagline: "Conscientiser l'élite, une vérité à la fois.",
                m_title: "MANIFESTE DE QUÉ",
                m_text: "Ici, vous n'êtes personne, et c'est ce qui donne du poids à votre voix.<br><br>Dites tout haut ce que vous vivez tout bas.",
                m_btn: "J'ENTRE",
                tabs: ["Politique", "Économie", "Culture", "Société"],
                prefix: "Je ne dis pas que...",
                pub_btn: "PUBLIER",
                alert: "Le silence ne conscientise personne.",
                legal: "QUÉ: Anonymat total. Contenus haineux interdits. Hébergé par GitHub. Usage réservé aux personnes majeures."
            },
            en: {
                tagline: "Raising awareness, one truth at a time.",
                m_title: "THE QUÉ MANIFESTO",
                m_text: "Here, you are no one, and that is what gives weight to your voice.<br><br>Speak out loud what you live in silence.",
                m_btn: "ENTER",
                tabs: ["Politics", "Economy", "Culture", "Society"],
                prefix: "I'm not saying that...",
                pub_btn: "POST",
                alert: "Silence raises no awareness.",
                legal: "QUÉ: Total anonymity. Hateful content prohibited. Hosted by GitHub. For adults only."
            },
            es: {
                tagline: "Concienciar a la élite, una verdad a la vez.",
                m_title: "MANIFIESTO DE QUÉ",
                m_text: "Aquí, no eres nadie, y eso es lo que da peso a tu voz.<br><br>Di en voz alta lo que vives en silencio.",
                m_btn: "ENTRAR",
                tabs: ["Política", "Economía", "Cultura", "Sociedad"],
                prefix: "No digo que...",
                pub_btn: "PUBLICAR",
                alert: "El silencio no conciencia a nadie.",
                legal: "QUÉ: Anonimato total. Contenido odioso prohibido. Alojado por GitHub. Solo para adultos."
            }
        };

        let currentLang = 'fr';

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`button[onclick="setLang('${lang}')"]`);
            if(activeBtn) activeBtn.classList.add('active');
            
            document.getElementById('tagline').innerText = translations[lang].tagline;
            document.getElementById('m-title').innerText = translations[lang].m_title;
            document.getElementById('m-text').innerHTML = translations[lang].m_text;
            document.getElementById('m-btn').innerText = translations[lang].m_btn;
            document.getElementById('pub-btn').innerText = translations[lang].pub_btn;
            document.getElementById('prefix-ui').innerText = translations[lang].prefix;
            document.getElementById('tab1').innerText = translations[lang].tabs[0];
            document.getElementById('tab2').innerText = translations[lang].tabs[1];
            document.getElementById('tab3').innerText = translations[lang].tabs[2];
            document.getElementById('tab4').innerText = translations[lang].tabs[3];
            
            chargerMessages();
        }

        function alertLegal() {
            alert(translations[currentLang].legal);
        }

        // Chargement des messages depuis Supabase
        async function chargerMessages() {
            const feed = document.getElementById('feed');
            feed.innerHTML = "<p style='text-align:center; color:var(--accent); font-size:0.8em;'>Chargement des secrets...</p>";
            
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                feed.innerHTML = "";

                if (error || !data || data.length === 0) {
                    feed.innerHTML = "<p style='text-align:center; color:var(--accent); font-size:0.8em;'>Aucun message pour le moment.</p>";
                    return;
                }

                data.forEach(msg => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerText = msg.content;
                    feed.appendChild(card);
                });
            } catch(e) {
                feed.innerHTML = "<p style='text-align:center; color:var(--accent); font-size:0.8em;'>Erreur de connexion.</p>";
            }
        }

        // Publication sur Supabase
        async function publier() {
            const input = document.getElementById('message-input');
            if(input.value.trim() === "") return alert(translations[currentLang].alert);
            
            const messageComplet = `${translations[currentLang].prefix} ${input.value}`;

            try {
                const { error } = await supabase
                    .from('messages')
                    .insert([{ content: messageComplet }]);

                if (error) {
                    alert("Erreur lors de la publication : " + error.message);
                } else {
                    input.value = "";
                    chargerMessages();
                }
            } catch(e) {
                alert("Erreur réseau.");
            }
        }

        function switchTab(i) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab')[i].classList.add('active');
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('light-mode')) {
                icon.innerText = '☀️';
            } else {
                icon.innerText = '🌙';
            }
        }

        // Initialisation automatique
        setLang('fr');
    </script>
</body>
</html>
