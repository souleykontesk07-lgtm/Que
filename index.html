<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUÉ</title>
    <link rel="manifest" href="manifest.json">
    <!-- Intégration du script Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- STYLES GÉNÉRAUX & THÈME SOMBRE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- EN-TÊTE --- */
        header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #222222;
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: 900;
        }

        header .subtitle {
            color: #888888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* --- CONTENU PRINCIPAL --- */
        main {
            padding: 15px;
            flex: 1;
        }

        /* Boîte de publication */
        .publish-box {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background-color: #111111;
            border: 1px solid #333333;
            border-radius: 12px;
            color: #FFFFFF;
            padding: 12px;
            font-size: 1rem;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #555555;
        }

        button {
            width: 100%;
            background-color: #FFFFFF;
            color: #000000;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #DDDDDD;
        }

        /* Flux de messages */
        .feed-section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #888888;
        }

        .loading {
            text-align: center;
            color: #555555;
            margin-top: 20px;
        }

        /* Style des cartes messages (générées par app.js) */
        .message-card {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .message-text {
            font-size: 1.05rem;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .message-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666666;
            font-size: 0.85rem;
        }

        .actions-btn {
            display: flex;
            gap: 15px;
        }

        .action-item {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- ADAPTATION GRAND ÉCRAN (PC / TABLETTE) --- */
        @media screen and (min-width: 768px) {
            body {
                background-color: #16161a; /* Fond de page pour combler les côtés sur PC */
                justify-content: center;
                align-items: center;
            }

            #app {
                width: 100%;
                max-width: 460px;       /* Largeur maximale style smartphone */
                height: 92vh;           /* Hauteur de l'application sur l'écran */
                max-height: 850px;
                background-color: #000000; /* Fond noir interne à l'application */
                border-radius: 24px;    /* Bords arrondis de l'application moderne */
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6); /* Effet d'ombre portée */
                display: flex;
                flex-direction: column;
                overflow: hidden;       /* Sécurise les débordements */
            }

            main {
                overflow-y: auto;       /* Permet le défilement uniquement dans l'app */
            }
        }
    </style>
</head>
<body>

    <!-- Ce conteneur "app" permet de centrer le jeu sur les grands écrans -->
    <div id="app">
        
        <header>
            <h1>QUÉ</h1>
            <p class="subtitle">Exprimez-vous anonymement</p>
        </header>

        <main>
            <!-- Zone d'écriture d'un nouveau message -->
            <section class="publish-box">
                <textarea id="message-input" placeholder="Partagez vos pensées, posez une question... (Anonyme)" maxlength="280"></textarea>
                <button id="send-btn">Publier</button>
            </section>

            <!-- Flux de messages -->
            <section class="feed-section">
                <h2>Fil d'actualité</h2>
                <div id="messages-feed">
                    <!-- Les messages de Supabase s'afficheront ici dynamiquement -->
                    <p class="loading">Chargement des messages...</p>
                </div>
            </section>
        </main>

    </div>

    <!-- Ton script logique d'application -->
    <script src="app.js"></script>
</body>
</html>
